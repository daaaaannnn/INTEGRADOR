<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Prácticas Académicas | Dashboard</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-mark small">GPA</div>
                <div>
                    <strong>Gestión Prácticas</strong>
                    <span>Panel por roles</span>
                </div>
            </div>
            <nav id="menu" class="menu"></nav>
            <div class="sidebar-profile">
                <div id="avatar" class="avatar">U</div>
                <div>
                    <strong id="sidebarName">Usuario</strong>
                    <span id="sidebarRole">Rol</span>
                </div>
            </div>
        </aside>

        <section class="main-area">
            <header class="topbar">
                <button id="mobileMenu" class="icon-btn" aria-label="Abrir menú">☰</button>
                <div>
                    <h1 id="pageTitle">Dashboard</h1>
                    <p id="pageSubtitle" class="muted">Resumen del sistema</p>
                </div>
                <div class="top-actions">
                    <button id="openNotifications" class="btn ghost">Notificaciones <span id="notifCount" class="badge">0</span></button>
                    <button id="openProfile" class="btn ghost">Perfil</button>
                    <button id="logout" class="btn danger">Salir</button>
                </div>
            </header>

            <main id="content" class="content"></main>
        </section>
    </div>

    <dialog id="recordDialog" class="modal">
        <form method="dialog" class="modal-card" id="recordForm">
            <div class="modal-header">
                <h2 id="modalTitle">Registro</h2>
                <button value="cancel" class="icon-btn">×</button>
            </div>
            <div id="modalFields" class="form-grid"></div>
            <div class="modal-actions">
                <button value="cancel" class="btn ghost">Cancelar</button>
                <button id="saveRecord" value="default" class="btn primary">Guardar</button>
            </div>
        </form>
    </dialog>

    <dialog id="profileDialog" class="modal">
        <form method="dialog" class="modal-card" id="profileForm">
            <div class="modal-header">
                <h2>Mi perfil</h2>
                <button value="cancel" class="icon-btn">×</button>
            </div>
            <div class="profile-edit">
                <label class="photo-uploader">
                    <input id="profilePhoto" type="file" accept="image/*">
                    <span>Subir foto o logo</span>
                </label>
                <label>
                    Comentario personal
                    <textarea id="profileComment" rows="4" maxlength="500" placeholder="Describe tu cargo, disponibilidad o información importante."></textarea>
                </label>
                <label>
                    Nueva contraseña
                    <input id="newPassword" type="password" placeholder="Dejar vacío si no desea cambiarla">
                </label>
            </div>
            <div class="modal-actions">
                <button value="cancel" class="btn ghost">Cancelar</button>
                <button id="saveProfile" value="default" class="btn primary">Guardar perfil</button>
            </div>
        </form>
    </dialog>

    <dialog id="drawerDialog" class="drawer">
        <form method="dialog" class="drawer-card">
            <div class="modal-header">
                <h2 id="drawerTitle">Detalle</h2>
                <button value="cancel" class="icon-btn">×</button>
            </div>
            <div id="drawerContent"></div>
        </form>
    </dialog>

    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
