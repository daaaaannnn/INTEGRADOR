# Configuración principal de Oracle para el Sistema de Gestión de Prácticas Académicas
# Compatible con Oracle 10g o superior y ojdbc14.jar.
db.driver=oracle.jdbc.driver.OracleDriver
db.url=jdbc:oracle:thin:@localhost:1521:XE
db.user=PROYECTOJD
db.password=PROYECTOJD
# URLs alternativas separadas por coma. El sistema las prueba automáticamente si falla db.url.
db.fallback.urls=jdbc:oracle:thin:@//localhost:1521/XE,jdbc:oracle:thin:@127.0.0.1:1521:XE,jdbc:oracle:thin:@//127.0.0.1:1521/XE
# Carpeta donde se guardan documentos cargados por estudiantes.
app.upload.dir=data/documentos
# Carpeta sugerida para reportes PDF generados.
app.report.dir=reportes
